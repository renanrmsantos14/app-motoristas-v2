                                                      Size: =15
                                                      Text: ="Observações"
                                                - TextCanvas1_68:
                                                    Control: Text@0.0.51
                                                    Properties:
                                                      AlignInContainer: =AlignInContainer.Stretch
                                                      AutoHeight: =true
                                                      Font: =Font.'Open Sans'
                                                      LayoutMinHeight: =16
                                                      LayoutMinWidth: =16
                                                      Text: =varDetalheAtual.Troca.Observação
                                    - ContainerFinalizarSERVICO_1:
                                        Control: GroupContainer@1.5.0
                                        Variant: AutoLayout
                                        Properties:
                                          AlignInContainer: =AlignInContainer.Center
                                          DropShadow: =DropShadow.None
                                          FillPortions: =0
                                          Height: =50
                                          LayoutAlignItems: =LayoutAlignItems.Stretch
                                          LayoutDirection: =LayoutDirection.Vertical
                                          LayoutJustifyContent: =LayoutJustifyContent.End
                                          LayoutMaxHeight: =
                                          LayoutMaxWidth: =
                                          LayoutMinHeight: =16
                                          LayoutMinWidth: =16
                                          RadiusBottomLeft: =0
                                          RadiusBottomRight: =0
                                          RadiusTopLeft: =0
                                          RadiusTopRight: =0
                                          Width: =Parent.Width * 0.5
                                          X: =40
                                          Y: =40
                                        Children:
                                          - ButtonFinalizarSERVICO_1:
                                              Control: Classic/Button@2.2.0
                                              Properties:
                                                BorderColor: =RGBA(0, 0, 0, 0)
                                                BorderStyle: =BorderStyle.None
                                                Color: =RGBA(255, 255, 255, 1)
                                                DisabledBorderColor: =RGBA(0, 0, 0, 0)
                                                DisabledColor: =RGBA(161, 159, 157, 1)
                                                DisabledFill: =RGBA(217, 217, 217, 0.31)
                                                DisplayMode: |-
                                                  =If(
                                                      IsBlank(varDetalheAtual.Troca) ||
                                                      IsBlank(varDetalheAtual.Troca.'GUID Trocas de Carro') ||
                                                      varDetalheAtual.Troca.'Status (cr40f_statusdatroca)' = 'Status da Troca de Carro'.Concluída,
                                                      DisplayMode.Disabled,
                                                      DisplayMode.Edit
                                                  )
                                                Fill: =RGBA(0, 14, 35, 1)
                                                FillPortions: =1
                                                Font: =Font.'Open Sans'
                                                FontWeight: =FontWeight.Normal
                                                HoverBorderColor: =RGBA(0, 0, 0, 0)
                                                HoverColor: =RGBA(255, 255, 255, 1)
                                                HoverFill: =RGBA(16, 110, 190, 1)
                                                LayoutMaxHeight: =50
                                                LayoutMinHeight: =16
                                                LayoutMinWidth: =16
                                                OnSelect: |-
                                                  =If(
                                                      varLoading,
                                                      false,

                                                      // ── [1] INICIALIZAÇÃO ──────────────────────────────────────────────────
                                                      Set(varLoading, true);
                                                      Set(_guidT,   varDetalheAtual.Troca.'GUID Trocas de Carro');
                                                      Set(_guidSrv, LookUp(Geral, OT.'GUID Trocas de Carro' = _guidT).'GUID Reserva de Veículos');

                                                      // ── [2] PRÓXIMO ITEM PENDENTE ──────────────────────────────────────────
                                                      Set(
                                                          _proxItem,
                                                          First(
                                                              SortByColumns(
                                                                  Filter(
                                                                      colAgendaUI,
                                                                      !IsBlank(DtOrdem) &&
                                                                      Tipo <> "HEADER" &&
                                                                      !(Tipo = "SERVICO"    && !IsBlank(DadosSERVICO)    && ("conclu" in Lower(Text(DadosSERVICO.'Status de Operação'))    || "cancel" in Lower(Text(DadosSERVICO.'Status de Operação')))) &&
                                                                      !(Tipo = "TROCA"      && !IsBlank(DadosTROCA)      && ("conclu" in Lower(Text(DadosTROCA.'Status (cr40f_statusdatroca)'))      || "cancel" in Lower(Text(DadosTROCA.'Status (cr40f_statusdatroca)')))) &&
                                                                      !(Tipo = "MANUTENCAO" && !IsBlank(DadosMANUTENCAO) && ((DadosMANUTENCAO.'Status (cr40f_status)' = 'Status (Manutenções)'.Realizado) || "conclu" in Lower(Text(DadosMANUTENCAO.'Status (cr40f_status)')) || "cancel" in Lower(Text(DadosMANUTENCAO.'Status (cr40f_status)'))))
                                                                  ),
                                                                  "DtOrdem",
                                                                  SortOrder.Ascending
                                                              )
                                                          )
                                                      );

                                                      // ── [3] VALIDAÇÕES INICIAIS ────────────────────────────────────────────
                                                      If(
                                                          IsBlank(_guidT),
                                                          Notify("Erro: Troca não identificada.", NotificationType.Error, 1000); Set(varLoading, false),

                                                          IsBlank(_proxItem),
                                                          Notify("Erro: Nenhuma tarefa pendente.", NotificationType.Error, 1000); Set(varLoading, false),

                                                          !(_proxItem.Tipo = "TROCA" && !IsBlank(LookUp('Trocas de Carro', 'GUID Trocas de Carro' = _guidT))),
                                                          Notify("Erro: Ordene as tarefas corretamente.", NotificationType.Warning, 1000); Set(varLoading, false),

                                                          // ── [4] BUSCA REGISTRO NO BANCO ───────────────────────────────────
                                                          Set(_tDb, LookUp('Trocas de Carro', 'GUID Trocas de Carro' = _guidT));
                                                          If(
                                                              IsBlank(_tDb) || IsBlank(_tDb.'GUID Trocas de Carro'),
                                                              Notify("Erro: Registro não encontrado no banco.", NotificationType.Error, 1000); Set(varLoading, false),

                                                              "conclu" in Lower(Text(_tDb.'Status (cr40f_statusdatroca)')),
                                                              Notify("Esta troca já está concluída.", NotificationType.Information, 1000); Set(varLoading, false),

                                                              // ── [5] FLAGS + REGISTROS COMPLETOS ───────────────────────────
                                                              Set(_tipoTroca, _tDb.'Tipo de Troca');
                                                              Set(_ehMot1,    _tDb.'Motorista 1'.'Email Microsoft' = varMotoristaUser.'Email Microsoft');

                                                              Set(_mot1Full, LookUp([@Funcionários], 'GUID Funcionários' = _tDb.'Motorista 1'.'GUID Funcionários'));
                                                              Set(_mot2Full, If(
                                                                  !IsBlank(_tDb.'Motorista 2'),
                                                                  LookUp([@Funcionários], 'GUID Funcionários' = _tDb.'Motorista 2'.'GUID Funcionários'),
                                                                  Blank()
                                                              ));
                                                              Set(_veic1Full, If(
                                                                  !IsBlank(_tDb.'Veículo 1 (Antes da Troca)'),
                                                                  LookUp([@Veículos], 'GUID Veículos' = _tDb.'Veículo 1 (Antes da Troca)'.'GUID Veículos'),
                                                                  Blank()
                                                              ));
                                                              Set(_veic2Full, If(
                                                                  !IsBlank(_tDb.'Veículo 2 (Antes da Troca)'),
                                                                  LookUp([@Veículos], 'GUID Veículos' = _tDb.'Veículo 2 (Antes da Troca)'.'GUID Veículos'),
                                                                  Blank()
                                                              ));

                                                              // ── [6] PATCH APENAS O CAMPO DO MOTORISTA ATUAL ───────────────
                                                              Set(
                                                                  _resTroca,
                                                                  If(
                                                                      _ehMot1,
                                                                      Patch('Trocas de Carro', _tDb, {
                                                                          'Concluído Motorista 1':   true,
                                                                          'Data e Horário da Troca': If(IsBlank(_tDb.'Data e Horário da Troca'), Now(), _tDb.'Data e Horário da Troca')
                                                                      }),
                                                                      Patch('Trocas de Carro', _tDb, {
                                                                          'Concluído Motorista 2':   true,
                                                                          'Data e Horário da Troca': If(IsBlank(_tDb.'Data e Horário da Troca'), Now(), _tDb.'Data e Horário da Troca')
                                                                      })
                                                                  )
                                                              );

                                                              If(IsError(_resTroca), Notify("Erro ao salvar confirmação.", NotificationType.Error, 1000); Set(varLoading, false));

                                                              // ── [7] RE-FETCH AO VIVO + DECIDE FLUXO COMPLETO ─────────────────
                                                  Refresh('Trocas de Carro');
                                                  Set(_tLive, LookUp('Trocas de Carro', 'GUID Trocas de Carro' = _guidT));

                                                  If(
                                                      IsBlank(_tLive),
                                                      Notify("Erro: Registro sumiu após patch.", NotificationType.Error, 1000); Set(varLoading, false),

                                                      Set(_podeConcluirTot,
                                                          If(
                                                              _ehMot1,
                                                              _tLive.'Concluído Motorista 2' = true,
                                                              _tLive.'Concluído Motorista 1' = true
                                                          )
                                                      );

                                                      Set(_executarFluxoCompleto,
                                                          (_tipoTroca = 'Tipo de Troca de Carro'.Troca && _podeConcluirTot) ||
                                                          (_tipoTroca = 'Tipo de Troca de Carro'.'Retirada da base') ||
                                                          (_tipoTroca = 'Tipo de Troca de Carro'.'Devolução à base')
                                                      );

                                                      If(
                                                          _executarFluxoCompleto,
                                                          Patch('Trocas de Carro', _tLive, {
                                                              'Status (cr40f_statusdatroca)': 'Status da Troca de Carro'.Concluída
                                                          })
                                                      )
                                                  );

                                                              // ── [8] PATCH POSSE DE VEÍCULOS ───────────────────────────────
                                                              // Só executa quando _executarFluxoCompleto = true.
                                                              Set(_errPosse, false);

                                                              If(
                                                                  _executarFluxoCompleto,

                                                                  // ── RETIRADA DA BASE ──────────────────────────────────────
                                                                  If(
                                                                      _tipoTroca = 'Tipo de Troca de Carro'.'Retirada da base',

                                                                      With(
                                                                          {_posseBase: LookUp('Posse de Veículos',
                                                                              Veículo.'GUID Veículos' = _veic2Full.'GUID Veículos' &&
                                                                              IsBlank(Motorista) &&
                                                                              IsBlank('Fim da Posse'))},
                                                                          If(!IsBlank(_posseBase), Patch('Posse de Veículos', _posseBase, {'Fim da Posse': Now()}))
                                                                      );

                                                                      With(
                                                                          {_posseDup: LookUp('Posse de Veículos',
                                                                              Motorista.'GUID Funcionários' = _mot1Full.'GUID Funcionários' &&
                                                                              Veículo.'GUID Veículos' = _veic2Full.'GUID Veículos' &&
                                                                              'Troca de Carro Relacionada'.'GUID Trocas de Carro' = _tDb.'GUID Trocas de Carro')},
                                                                          If(!IsBlank(_posseDup), Remove('Posse de Veículos', _posseDup))
                                                                      );

                                                                      If(
                                                                          !IsBlank(_veic2Full) && !IsBlank(_mot1Full),
                                                                          Set(_resPosse, Patch('Posse de Veículos', Defaults('Posse de Veículos'), {
                                                                              Veículo:                      _veic2Full,
                                                                              Motorista:                    _mot1Full,
                                                                              'Início da Posse':            Now(),
                                                                              'Fim da Posse':               Blank(),
                                                                              'Troca de Carro Relacionada': _tDb
                                                                          }));
                                                                          If(IsError(_resPosse), Notify("Erro ao criar posse (Retirada).", NotificationType.Error, 1000); Set(_errPosse, true)),
                                                                          Notify("[P8] Dados inválidos para Retirada.", NotificationType.Error, 1000); Set(_errPosse, true)
                                                                      )
                                                                  );

                                                                  // ── DEVOLUÇÃO À BASE ──────────────────────────────────────
                                                                  If(
                                                                      _tipoTroca = 'Tipo de Troca de Carro'.'Devolução à base',

                                                                      With(
                                                                          {_posseMot: LookUp('Posse de Veículos',
                                                                              Motorista.'GUID Funcionários' = _mot1Full.'GUID Funcionários' &&
                                                                              IsBlank('Fim da Posse'))},
                                                                          If(!IsBlank(_posseMot), Patch('Posse de Veículos', _posseMot, {'Fim da Posse': Now()}))
                                                                      );

                                                                      With(
                                                                          {_posseDup: LookUp('Posse de Veículos',
                                                                              IsBlank(Motorista) &&
                                                                              Veículo.'GUID Veículos' = _veic1Full.'GUID Veículos' &&
                                                                              'Troca de Carro Relacionada'.'GUID Trocas de Carro' = _tDb.'GUID Trocas de Carro')},
                                                                          If(!IsBlank(_posseDup), Remove('Posse de Veículos', _posseDup))
                                                                      );

                                                                      If(
                                                                          !IsBlank(_veic1Full),
                                                                          Set(_resPosse, Patch('Posse de Veículos', Defaults('Posse de Veículos'), {
                                                                              Veículo:                      _veic1Full,
                                                                              Motorista:                    Blank(),
                                                                              'Início da Posse':            Now(),
                                                                              'Fim da Posse':               Blank(),
                                                                              'Troca de Carro Relacionada': _tDb
                                                                          }));
                                                                          If(IsError(_resPosse), Notify("Erro ao criar posse (Devolução).", NotificationType.Error, 1000); Set(_errPosse, true)),
                                                                          Notify("[P8] Veículo inválido para Devolução.", NotificationType.Error, 1000); Set(_errPosse, true)
                                                                      )
                                                                  );

                                                                  // ── TROCA BILATERAL ───────────────────────────────────────
                                                                  If(
                                                                      _tipoTroca = 'Tipo de Troca de Carro'.Troca,

                                                                      With(
                                                                          {_p1: LookUp('Posse de Veículos',
                                                                              Motorista.'GUID Funcionários' = _mot1Full.'GUID Funcionários' &&
                                                                              IsBlank('Fim da Posse'))},
                                                                          If(!IsBlank(_p1), Patch('Posse de Veículos', _p1, {'Fim da Posse': Now()}))
                                                                      );

                                                                      With(
                                                                          {_p2: LookUp('Posse de Veículos',
                                                                              Motorista.'GUID Funcionários' = _mot2Full.'GUID Funcionários' &&
                                                                              IsBlank('Fim da Posse'))},
                                                                          If(!IsBlank(_p2), Patch('Posse de Veículos', _p2, {'Fim da Posse': Now()}))
                                                                      );

                                                                      With(
                                                                          {_dupP1: LookUp('Posse de Veículos',
                                                                              Motorista.'GUID Funcionários' = _mot1Full.'GUID Funcionários' &&
                                                                              Veículo.'GUID Veículos' = _veic2Full.'GUID Veículos' &&
                                                                              'Troca de Carro Relacionada'.'GUID Trocas de Carro' = _tDb.'GUID Trocas de Carro')},
                                                                          If(!IsBlank(_dupP1), Remove('Posse de Veículos', _dupP1))
                                                                      );

                                                                      With(
                                                                          {_dupP2: LookUp('Posse de Veículos',
                                                                              Motorista.'GUID Funcionários' = _mot2Full.'GUID Funcionários' &&
                                                                              Veículo.'GUID Veículos' = _veic1Full.'GUID Veículos' &&
                                                                              'Troca de Carro Relacionada'.'GUID Trocas de Carro' = _tDb.'GUID Trocas de Carro')},
                                                                          If(!IsBlank(_dupP2), Remove('Posse de Veículos', _dupP2))
                                                                      );

                                                                      If(
                                                                          !IsBlank(_veic2Full) && !IsBlank(_mot1Full) && !IsBlank(_veic1Full) && !IsBlank(_mot2Full),

                                                                          Set(_resTrocaP1, Patch('Posse de Veículos', Defaults('Posse de Veículos'), {
                                                                              Veículo:                      _veic2Full,
                                                                              Motorista:                    _mot1Full,
                                                                              'Início da Posse':            Now(),
                                                                              'Fim da Posse':               Blank(),
                                                                              'Troca de Carro Relacionada': _tDb
                                                                          }));
                                                                          Set(_resTrocaP2, Patch('Posse de Veículos', Defaults('Posse de Veículos'), {
                                                                              Veículo:                      _veic1Full,
                                                                              Motorista:                    _mot2Full,
                                                                              'Início da Posse':            Now(),
                                                                              'Fim da Posse':               Blank(),
                                                                              'Troca de Carro Relacionada': _tDb
                                                                          }));

                                                                          If(
                                                                              IsError(_resTrocaP1) || IsError(_resTrocaP2),
                                                                              Notify("Erro ao criar posses da troca.", NotificationType.Error, 1000);
                                                                              Set(_errPosse, true)
                                                                          ),

                                                                          Notify("[P8] Veículos ou Motoristas inválidos para Troca.", NotificationType.Error, 1000);
                                                                          Set(_errPosse, true)
                                                                      )
                                                                  )
                                                              );

                                                              // ── [9] PATCH GERAL ───────────────────────────────────────────
                                                              Set(_errGeral, false);
                                                              If(
                                                                  _executarFluxoCompleto,
                                                                  Set(_resGeral, Patch(Geral, LookUp(Geral, 'GUID Reserva de Veículos' = _guidSrv), {'Data de Finalização': Now()}));
                                                                  If(
                                                                      IsError(_resGeral),
                                                                      Notify("Erro ao atualizar agendamento.", NotificationType.Error, 1000); Set(_errGeral, true),
                                                                      Set(_errGeral, false)
                                                                  )
                                                              );

                                                              // ── [10] SINCRONIZA CACHES LOCAIS ─────────────────────────────
                                                              Set(_tAtualizada, LookUp('Trocas de Carro', 'GUID Trocas de Carro' = _guidT));
                                                              Set(varDetalheAtual, Patch(varDetalheAtual, {Troca: _tAtualizada}));
                                                              If(
                                                                  !IsBlank(LookUp(colAgenda, DadosTROCA.'GUID Trocas de Carro' = _guidT)),
                                                                  Patch(colAgenda, LookUp(colAgenda, DadosTROCA.'GUID Trocas de Carro' = _guidT), {DadosTROCA: _tAtualizada})
                                                              );
                                                              If(
                                                                  !IsBlank(LookUp(colAgendaUI, DadosTROCA.'GUID Trocas de Carro' = _guidT)),
                                                                  Patch(colAgendaUI, LookUp(colAgendaUI, DadosTROCA.'GUID Trocas de Carro' = _guidT), {DadosTROCA: _tAtualizada})
                                                              );

                                                              // ── [11] NOTIFICAÇÃO FINAL E NAVEGAÇÃO ────────────────────────
                                                              If(
                                                                  _errPosse || _errGeral,
                                                                  Notify("Erro ao atualizar posse de veículo. Contate o administrador.", NotificationType.Error, 4000);
                                                                  Set(varLoading, false);
                                                                  Navigate(TelaFinalizar, ScreenTransition.Fade),

                                                                  !(_errPosse || _errGeral) && _executarFluxoCompleto,
                                                                  Notify("Operação concluída com sucesso.", NotificationType.Success, 1000);
                                                                  Set(varLoading, false);
                                                                  Navigate(TelaFinalizar, ScreenTransition.Fade),

                                                                  Notify("Confirmação registrada. Aguardando outro motorista.", NotificationType.Information, 1000);
                                                                  Set(varLoading, false);
                                                                  Navigate(TelaFinalizar, ScreenTransition.Fade)
                                                              )
                                                          )
                                                      )
                                                  )
