                                                                  Weight: ='TextCanvas.Weight'.Regular
                                                                  Width: =60
                                                            - ButtonCanvas3_2:
                                                                Control: Button@0.0.45
                                                                Properties:
                                                                  Appearance: ='ButtonCanvas.Appearance'.Transparent
                                                                  Height: =Parent.Height
                                                                  OnSelect: |-
                                                                    =// 1) Escolhe o telefone base (motorista 1 vs 2)
                                                                    Set(
                                                                        varTelefoneBase,
                                                                        If(
                                                                            varMotoristaUser.'GUID Funcionários' = varDetalheAtual.Troca.'Motorista 1'.'GUID Funcionários',
                                                                            Coalesce(
                                                                                varDetalheAtual.Troca.'Motorista 2'.'Telefone Corporativo',
                                                                                varDetalheAtual.Troca.'Motorista 2'.'Telefone Pessoal'
                                                                            ),
                                                                            Coalesce(
                                                                                varDetalheAtual.Troca.'Motorista 1'.'Telefone Corporativo',
                                                                                varDetalheAtual.Troca.'Motorista 1'.'Telefone Pessoal'
                                                                            )
                                                                        )
                                                                    );
                                                                    // 2) Limpa: mantém só dígitos
                                                                    Set(
                                                                        varTelefoneLimpo,
                                                                        Coalesce(
                                                                            Concat(
                                                                                MatchAll(Coalesce(varTelefoneBase, ""), "\d"),
                                                                                FullMatch
                                                                            ),
                                                                            ""
                                                                        )
                                                                    );
                                                                    // 3) Normaliza: + apenas quando parecer código de país
                                                                    Set(
                                                                        varTelFinal,
                                                                        With(
                                                                            { t: Trim(varTelefoneLimpo) },
                                                                            If(
                                                                                IsBlank(t) || Len(t) = 0,
                                                                                Blank(),
                                                                                // 00 + código país => converte para +
                                                                                Left(t, 2) = "00" && Len(t) > 2,
                                                                                "+" & Mid(t, 3, Len(t) - 2),
                                                                                // 12–15 dígitos => assume internacional e prefixa +
                                                                                Len(t) >= 12 && Len(t) <= 15,
                                                                                "+" & t,
                                                                                // Caso contrário => mantém sem +
                                                                                t
                                                                            )
                                                                        )
                                                                    );
                                                                    // 4) Validação final antes do Launch
                                                                    If(
                                                                        !IsBlank(varTelFinal) && Len(varTelFinal) >= 8,
                                                                        Launch("tel:" & varTelFinal),
                                                                        Notify(
                                                                            "Motorista não possui telefone válido cadastrado!",
                                                                            NotificationType.Error,
                                                                            3000
                                                                        )
