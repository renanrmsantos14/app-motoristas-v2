                                          - ContainerVeículo_3:
                                              Control: GroupContainer@1.5.0
                                              Variant: AutoLayout
                                              Properties:
                                                DropShadow: =DropShadow.None
                                                FillPortions: =0
                                                Height: =Self.PaddingBottom + Self.PaddingTop + TextCanvas5_38.Height + TextCanvas1_67.Height
                                                LayoutDirection: =LayoutDirection.Vertical
                                                LayoutMinHeight: =TextCanvas5_38.Height + TextCanvas1_67.Height + Self.LayoutGap + Self.PaddingBottom + Self.PaddingTop
                                                LayoutMinWidth: =16
                                                PaddingBottom: =8
                                                PaddingLeft: =8
                                                PaddingRight: =8
                                                PaddingTop: =8
                                              Children:
                                                - TextCanvas5_38:
                                                    Control: Text@0.0.51
                                                    Properties:
                                                      AlignInContainer: =AlignInContainer.Stretch
                                                      AutoHeight: =true
                                                      Font: =Font.'Lato Black'
                                                      FontColor: =RGBA(0, 0, 0, 1)
                                                      LayoutMinHeight: =16
                                                      LayoutMinWidth: =16
                                                      Size: =15
                                                      Text: ="Veículos envolvidos:"
                                                - TextCanvas1_67:
                                                    Control: Text@0.0.51
                                                    Properties:
                                                      AlignInContainer: =AlignInContainer.Stretch
                                                      AutoHeight: =true
                                                      Font: =Font.'Open Sans'
                                                      LayoutMinHeight: =16
                                                      LayoutMinWidth: =16
                                                      Size: =16
                                                      Text: "=With(\r\n    {\r\n        tipo: varDetalheAtual.Troca.'Tipo de Troca',\r\n        veic1: varDetalheAtual.Troca.'Veículo 1 (Antes da Troca)',\r\n        veic2: varDetalheAtual.Troca.'Veículo 2 (Antes da Troca)',\r\n        euSouMot1: varMotoristaUser.'GUID Funcionários' = varDetalheAtual.Troca.'Motorista 1'.'GUID Funcionários'\r\n    },\r\n    Switch(\r\n        tipo,\r\n        \r\n        // ── TROCA ENTRE MOTORISTAS ──\r\n        'Tipo de Troca de Carro'.Troca,\r\n            If(\r\n                euSouMot1,\r\n                \"Você entrega:\" & Char(10)&\r\n                Coalesce(veic1.Modelo, \"Veículo\") & \" | \" & Coalesce(veic1.Placa, \"Sem placa\") & Char(10) &\r\n                \"Você recebe:\"&\r\n                Coalesce(veic2.Modelo, \"Veículo\") & \" | \" & Coalesce(veic2.Placa, \"Sem placa\"),\r\n                \r\n                \"Você entrega: \" &\r\n                Coalesce(veic2.Modelo, \"Veículo\") & \" | \" & Coalesce(veic2.Placa, \"Sem placa\") & Char(10) &\r\n                \"Você recebe: \" &\r\n                Coalesce(veic1.Modelo, \"Veículo\") & \" | \" & Coalesce(veic1.Placa, \"Sem placa\")\r\n            ),\r\n        \r\n        // ── RETIRADA DA BASE ──\r\n        'Tipo de Troca de Carro'.'Retirada da base',\r\n            \"Você recebe: \" &\r\n            Coalesce(veic2.Modelo, \"Veículo\") & \" | \" & Coalesce(veic2.Placa, \"Sem placa\"),\r\n        \r\n        // ── DEVOLUÇÃO À BASE ──\r\n        'Tipo de Troca de Carro'.'Devolução à base',\r\n            \"Você entrega: \" &\r\n            Coalesce(veic1.Modelo, \"Veículo\") & \" | \" & Coalesce(veic1.Placa, \"Sem placa\"),\r\n        \r\n        // ── FALLBACK ──\r\n        \"⚠️ Informações de veículo não disponíveis\"\r\n    )\r\n)"
                                                      Weight: ='TextCanvas.Weight'.Semibold
                                          - ContainerObsdaTroca_1:
                                              Control: GroupContainer@1.5.0
                                              Variant: AutoLayout
                                              Properties:
                                                DropShadow: =DropShadow.None
                                                FillPortions: =0
                                                Height: =Self.PaddingBottom + Self.PaddingTop + TextCanvas5_39.Height + TextCanvas1_68.Height
                                                LayoutDirection: =LayoutDirection.Vertical
                                                LayoutMinHeight: =TextCanvas5_39.Height + TextCanvas1_68.Height + Self.LayoutGap + Self.PaddingBottom + Self.PaddingTop
                                                LayoutMinWidth: =16
                                                PaddingBottom: =8
                                                PaddingLeft: =8
