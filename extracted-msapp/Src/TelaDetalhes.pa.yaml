                                                                      Notify(
                                                                          "Este serviço já foi concluído.",
                                                                          NotificationType.Information,
                                                                          4000
                                                                      );
                                                                      Set(
                                                                          varLoading,
                                                                          false
                                                                      ),
                                                                      // ── 6. Confirm: aviso de horário próximo ──────────
                                                                      If(
                                                                          _diffMin <= 10 && !Confirm(
                                                                              If(
                                                                                  _diffMin < 0,
                                                                                  "A saída está programada para daqui " & _diffFormatado & "." & Char(10) & Char(10) & "Deseja concluir este serviço agora?",
                                                                                  "O horário de saída foi há " & _diffFormatado & "." & Char(10) & Char(10) & "Deseja concluir este serviço agora?"
                                                                              ),
                                                                              {
                                                                                  Title: "⚠️ Atenção",
                                                                                  ConfirmButton: "Confirmar",
                                                                                  CancelButton: "Cancelar"
                                                                              }
                                                                          ),
                                                                          Set(
                                                                              varLoading,
                                                                              false
                                                                          ),
                                                                          // ── 7. Busca no banco ─────────────────────────
                                                                          With(
                                                                              {
                                                                                  srvDb: LookUp(
                                                                                      Geral,
                                                                                      'GUID Reserva de Veículos' = _guidSrv
                                                                                  )
                                                                              },
                                                                              If(
                                                                                  IsBlank(srvDb),
                                                                                  Notify(
                                                                                      "Serviço não encontrado. Atualize a página.",
                                                                                      NotificationType.Error,
                                                                                      4000
                                                                                  );
                                                                                  Set(
                                                                                      varLoading,
                                                                                      false
                                                                                  ),
                                                                                  // ── 8. Patch + atualização local ──────
                                                                                  IfError(
                                                                                      With(
                                                                                          {
                                                                                              srvAtualizado: Patch(
                                                                                                  Geral,
                                                                                                  srvDb,
                                                                                                  {
                                                                                                      'Status de Operação': 'Status de Operação'.Concluído,
                                                                                                      'Data de Finalização': Now()
                                                                                                  }
                                                                                              )
                                                                                          },
                                                                                          Set(
                                                                                              varDetalheAtual,
                                                                                              {Servico: srvAtualizado}
                                                                                          );
                                                                                          With(
                                                                                              {
                                                                                                  recAgenda: LookUp(
                                                                                                      colAgenda,
                                                                                                      Tipo = "SERVICO" && !IsBlank(DadosSERVICO) && DadosSERVICO.'GUID Reserva de Veículos' = _guidSrv
                                                                                                  )
                                                                                              },
                                                                                              If(
                                                                                                  !IsBlank(recAgenda),
                                                                                                  Patch(
                                                                                                      colAgenda,
                                                                                                      recAgenda,
                                                                                                      {DadosSERVICO: srvAtualizado}
                                                                                                  )
                                                                                              )
                                                                                          );
                                                                                          With(
                                                                                              {
                                                                                                  recAgendaUI: LookUp(
                                                                                                      colAgendaUI,
                                                                                                      Tipo = "SERVICO" && !IsBlank(DadosSERVICO) && DadosSERVICO.'GUID Reserva de Veículos' = _guidSrv
