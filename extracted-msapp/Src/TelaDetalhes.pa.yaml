                                                                                                      recAgendaUI,
                                                                                                      {DadosSERVICO: srvAtualizado}
                                                                                                  )
                                                                                              )
                                                                                          );
                                                                                          Notify(
                                                                                              "✅ Serviço concluído com sucesso!",
                                                                                              NotificationType.Success,
                                                                                              3000
                                                                                          );
                                                                                          Set(
                                                                                              varLoading,
