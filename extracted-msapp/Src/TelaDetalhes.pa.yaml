                                                HoverFill: =RGBA(16, 110, 190, 1)
                                                LayoutMaxHeight: =50
                                                LayoutMinHeight: =16
                                                LayoutMinWidth: =16
                                                OnSelect: |-
                                                  =If(
                                                      varLoading,
                                                      false,
                                                      Set(
                                                          varLoading,
                                                          true
                                                      );
                                                      // ── 1. Variáveis locais ──────────────────────────────────────────
                                                      Set(
                                                          _guidSrv,
                                                          varDetalheAtual.Servico.'GUID Reserva de Veículos'
                                                      );
                                                      Set(
                                                          _diffMin,
                                                          DateDiff(
                                                              varDetalheAtual.Servico.'Data e horário de saída',
                                                              Now(),
                                                              TimeUnit.Minutes
                                                          )
                                                      );
                                                      Set(
                                                          _diffFormatado,
                                                          If(
                                                              Abs(_diffMin) >= 60,
                                                              Text(Int(Abs(_diffMin) / 60)) & "h" & Text(
                                                                  Mod(
                                                                      Abs(_diffMin),
                                                                      60
                                                                  ),
                                                                  "00"
                                                              ) & "min",
                                                              Text(Abs(_diffMin)) & "min"
                                                          )
                                                      );
                                                      // Primeiro item PENDENTE da fila única
                                                      Set(
                                                      _proxItem,
                                                      First(
                                                          SortByColumns(
                                                              Filter(
                                                                  colAgendaUI,
                                                                  !IsBlank(DtOrdem) &&
                                                                  Tipo <> "HEADER" &&
                                                                  !(Tipo = "SERVICO"    && !IsBlank(DadosSERVICO)    && ("conclu" in Lower(Text(DadosSERVICO.'Status de Operação'))    || "cancel" in Lower(Text(DadosSERVICO.'Status de Operação')))) &&
                                                                  !(Tipo = "TROCA"      && !IsBlank(DadosTROCA)      && ("conclu" in Lower(Text(DadosTROCA.'Status (cr40f_statusdatroca)'))          || "cancel" in Lower(Text(DadosTROCA.'Status (cr40f_statusdatroca)')))) &&
                                                                  !(Tipo = "MANUTENCAO" && !IsBlank(DadosMANUTENCAO) && ("realizado" in Lower(Text(DadosMANUTENCAO.'Status (cr40f_status)')) || "conclu" in Lower(Text(DadosMANUTENCAO.'Status (cr40f_status)')) || "cancel" in Lower(Text(DadosMANUTENCAO.'Status (cr40f_status)'))))
                                                              ),
                                                              "DtOrdem",
                                                              SortOrder.Ascending
                                                          )
                                                      )
                                                  );
                                                      // ── 2. Validação: GUID existe ────────────────────────────────────
                                                      If(
                                                          IsBlank(_guidSrv),
                                                          Notify(
                                                              "Não foi possível identificar o serviço.",
                                                              NotificationType.Error,
                                                              4000
                                                          );
                                                          Set(
                                                              varLoading,
                                                              false
                                                          ),
                                                          // ── 3. Validação: fila não está vazia ────────────────────────
                                                          If(
                                                              IsBlank(_proxItem),
                                                              Notify(
                                                                  "Nenhum item pendente encontrado na fila.",
                                                                  NotificationType.Error,
                                                                  4000
                                                              );
                                                              Set(
                                                                  varLoading,
                                                                  false
                                                              ),
                                                              // ── 4. Validação: este serviço é o primeiro pendente ─────
                                                              If(
                                                                  !(_proxItem.Tipo = "SERVICO" && _proxItem.DadosSERVICO.'GUID Reserva de Veículos' = _guidSrv),
                                                                  Notify(
                                                                      "⚠️ Conclua os itens anteriores da fila antes de prosseguir.",
                                                                      NotificationType.Warning,
                                                                      4000
                                                                  );
                                                                  Set(
                                                                      varLoading,
                                                                      false
                                                                  ),
                                                                  // ── 5. Validação: ainda não concluído ─────────────────
                                                                  If(
