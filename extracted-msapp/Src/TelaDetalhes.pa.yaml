Screens:
  TelaDetalhes:
    Properties:
      Fill: =RGBA(255, 255, 255, 1)
      LoadingSpinnerColor: =RGBA(0, 120, 212, 1)
      OnVisible: |-
        =Set(varLoading, true);
        Set(varConfirmaCancelamento, false);

        Set(
            gGUIDServicoAtual,
            If(
                !IsBlank(varServicoSelecionado.Servico),
                varServicoSelecionado.Servico.'GUID Reserva de Veículos',
                If(
                    Or(IsBlank(Param("servicoId")), gParamConsumed),
                    Blank(),
                    IfError(
                        LookUp(
                            Geral,
                            'GUID Reserva de Veículos' = GUID(
                                Substitute(
                                    Substitute(Param("servicoId"), "{", ""),
                                    "}", ""
                                )
                            )
                        ).'GUID Reserva de Veículos',
                        Blank()
                    )
                )
            )
        );

        With(
            {
                srvFinal: If(
                    !IsBlank(varServicoSelecionado.Servico),
                    varServicoSelecionado.Servico,
                    If(
                        Or(IsBlank(Param("servicoId")), gParamConsumed),
                        Blank(),
                        IfError(
                            LookUp(
                                Geral,
                                'GUID Reserva de Veículos' = GUID(
                                    Substitute(
                                        Substitute(Param("servicoId"), "{", ""),
                                        "}", ""
                                    )
                                )
                            ),
                            Blank()
                        )
                    )
                ),
                trocaFinal: varServicoSelecionado.Troca,
                manutFinal: varServicoSelecionado.Manut
            },

            If(
                IsBlank(srvFinal) && IsBlank(trocaFinal) && IsBlank(manutFinal),

                Notify(
                    "Serviço não encontrado. Volte e tente novamente.",
                    NotificationType.Error,
                    5000
                );
                Set(varLoading, false),

                // ── SERVIÇO ENCONTRADO ──
                Set(
                    varDetalheAtual,
                    {
                        Tipo: Coalesce(varServicoSelecionado.Tipo, Param("tipo"), "SERVICO"),
                        HasServico: !IsBlank(srvFinal),
                        HasTroca:   !IsBlank(trocaFinal),
                        HasManut:   !IsBlank(manutFinal),
                        Servico:    srvFinal,
                        Troca:      trocaFinal,
                        Manut:      manutFinal,
                        ManutGeral: varServicoSelecionado.ManutGeral
                    }
                );
                Set(gParamServicoId, "");
                Set(gParamConsumed, true);
                Set(
                    varRascunho,
                    ParseJSON(Coalesce(srvFinal.'Rascunho Voucher', "{}"))
                );
                If(!IsBlank(srvFinal), Reset(PenInputPas));
                Set(varOrientacao, If(App.Width > App.Height, "Paisagem", "Retrato"));

                If(
                    !IsBlank(gGUIDServicoAtual),

                    // ═══════════════════════════════════════
                    // PIPELINE DE TELEFONE — À PROVA DE BALA
                    // ═══════════════════════════════════════

                    // ETAPA 1 — Busca raw do Dataverse
                    ClearCollect(
                        colPaxRaw,
                        AddColumns(
                            Filter(
                                'Serviços por Passageiro',
                                'Geral (Coluna Serviços por Passageiro)'.'GUID Reserva de Veículos' = gGUIDServicoAtual
                            ),
                            NomePax,
                            Trim(
                                Coalesce(
                                    'Banco de Dados (Coluna Serviços por Passageiro)'.'Nome do Passageiro',
                                    ""
                                )
                            ),
                            TelRaw,
                            Coalesce(
                                'Banco de Dados (Coluna Serviços por Passageiro)'.Telefone,
                                ""
                            ),
                            IdiomaRaw,
                            Coalesce(
                                'Banco de Dados (Coluna Serviços por Passageiro)'.Idioma,
                                Idioma.Português
                            )
                        )
                    );

                    // ETAPA 2 — Preserva metadados + limpeza nuclear
        // PASSE 1 — Símbolos/pontuação/espaços especiais
        ClearCollect(
            _colP1,
            AddColumns(
                colPaxRaw,
                TelOriginal,
                Trim(TelRaw),
                TinhaPlus,
                StartsWith(Trim(TelRaw), "+"),
                TinhaZeroZero,
                StartsWith(
                    Substitute(Substitute(Trim(TelRaw), " ", ""), "+", ""),
                    "00"
                ),
                _p1,
                Substitute(Substitute(Substitute(Substitute(Substitute(
                Substitute(Substitute(Substitute(Substitute(Substitute(
                Substitute(Substitute(Substitute(Substitute(Substitute(
                Substitute(Substitute(Substitute(Substitute(Substitute(
                Substitute(Substitute(Substitute(Substitute(Substitute(
                Substitute(Substitute(Substitute(Substitute(Substitute(
                Substitute(Substitute(Substitute(
                    TelRaw,
                    " ", ""), "-", ""), "(", ""), ")", ""), "+", ""),
                    ".", ""), "/", ""), "\", ""), "#", ""), "*", ""),
                    ",", ""), ";", ""), ":", ""), "!", ""), "?", ""),
                    "@", ""), "'", ""), """", ""), "&", ""), "=", ""),
                    "	", ""), "
        ", ""), "
        ", ""),
                    " ", ""),
                    "­", ""),
                    "​", ""),
                    "–", ""),
                    "—", ""),
                    "", ""),
                    "", ""),
                    "", ""),
                    "", ""),
                    "", ""
                )
            )
        );

        // PASSE 2 — Minúsculas a-m
        ClearCollect(
            _colP2,
            AddColumns(
                _colP1,
                _p2,
                Substitute(Substitute(Substitute(Substitute(Substitute(
                Substitute(Substitute(Substitute(Substitute(Substitute(
                Substitute(Substitute(Substitute(
                    _p1,
                    "a", ""), "b", ""), "c", ""), "d", ""), "e", ""),
                    "f", ""), "g", ""), "h", ""), "i", ""), "j", ""),
                    "k", ""), "l", ""), "m", ""
                )
            )
        );

        // PASSE 3 — Minúsculas n-z
        ClearCollect(
            _colP3,
            AddColumns(
                _colP2,
                _p3,
                Substitute(Substitute(Substitute(Substitute(Substitute(
                Substitute(Substitute(Substitute(Substitute(Substitute(
                Substitute(Substitute(Substitute(
                    _p2,
                    "n", ""), "o", ""), "p", ""), "q", ""), "r", ""),
                    "s", ""), "t", ""), "u", ""), "v", ""), "w", ""),
                    "x", ""), "y", ""), "z", ""
                )
            )
        );

        // PASSE 4 — Maiúsculas A-M
        ClearCollect(
            _colP4,
            AddColumns(
                _colP3,
                _p4,
                Substitute(Substitute(Substitute(Substitute(Substitute(
                Substitute(Substitute(Substitute(Substitute(Substitute(
                Substitute(Substitute(Substitute(
                    _p3,
                    "A", ""), "B", ""), "C", ""), "D", ""), "E", ""),
                    "F", ""), "G", ""), "H", ""), "I", ""), "J", ""),
                    "K", ""), "L", ""), "M", ""
                )
            )
        );

        // PASSE 5 — Maiúsculas N-Z
        ClearCollect(
            _colP5,
            AddColumns(
                _colP4,
                _p5,
                Substitute(Substitute(Substitute(Substitute(Substitute(
                Substitute(Substitute(Substitute(Substitute(Substitute(
                Substitute(Substitute(Substitute(
                    _p4,
                    "N", ""), "O", ""), "P", ""), "Q", ""), "R", ""),
                    "S", ""), "T", ""), "U", ""), "V", ""), "W", ""),
                    "X", ""), "Y", ""), "Z", ""
                )
            )
        );

        // PASSE 6 — Acentuados minúsculos
        ClearCollect(
            _colP6,
            AddColumns(
                _colP5,
                _p6,
                Substitute(Substitute(Substitute(Substitute(Substitute(
                Substitute(Substitute(Substitute(Substitute(Substitute(
                Substitute(Substitute(Substitute(Substitute(Substitute(
                Substitute(Substitute(Substitute(Substitute(Substitute(
                Substitute(Substitute(Substitute(Substitute(Substitute(
                Substitute(
                    _p5,
                    "à", ""), "á", ""), "â", ""), "ã", ""), "ä", ""),
                    "ç", ""), "è", ""), "é", ""), "ê", ""), "ë", ""),
                    "ì", ""), "í", ""), "î", ""), "ï", ""), "ñ", ""),
                    "ò", ""), "ó", ""), "ô", ""), "õ", ""), "ö", ""),
                    "ù", ""), "ú", ""), "û", ""), "ü", ""), "ý", ""),
                    "ß", ""
                )
            )
        );

        // PASSE 7 — Acentuados maiúsculos → colPaxLimpo final
        ClearCollect(
            colPaxLimpo,
            AddColumns(
                _colP6,
                TelSoDigitos,
                Substitute(Substitute(Substitute(Substitute(Substitute(
                Substitute(Substitute(Substitute(Substitute(Substitute(
                Substitute(Substitute(Substitute(Substitute(Substitute(
                Substitute(Substitute(Substitute(Substitute(Substitute(
                Substitute(Substitute(Substitute(Substitute(
                    _p6,
                    "À", ""), "Á", ""), "Â", ""), "Ã", ""), "Ä", ""),
                    "Ç", ""), "È", ""), "É", ""), "Ê", ""), "Ë", ""),
                    "Ì", ""), "Í", ""), "Î", ""), "Ï", ""), "Ñ", ""),
                    "Ò", ""), "Ó", ""), "Ô", ""), "Õ", ""), "Ö", ""),
                    "Ù", ""), "Ú", ""), "Û", ""), "Ü", ""
                )
            )
        );

        // Limpa intermediárias
        Clear(_colP1);
        Clear(_colP2);
        Clear(_colP3);
        Clear(_colP4);
        Clear(_colP5);
        Clear(_colP6);

                    // ETAPA 3 — Normalização de prefixo
                    ClearCollect(
                        colPaxNorm,
                        AddColumns(
                            colPaxLimpo,
                            TelNorm,
                            With(
                                {
                                    _semZZ: If(
                                        And(
                                            StartsWith(TelSoDigitos, "00"),
                                            Len(TelSoDigitos) > 10
                                        ),
                                        Mid(TelSoDigitos, 3),
                                        TelSoDigitos
                                    )
                                },
                                If(
                                    And(
                                        Left(_semZZ, 1) = "0",
                                        Not(TinhaPlus),
                                        Len(_semZZ) > 8
                                    ),
                                    Mid(_semZZ, 2),
                                    _semZZ
                                )
                            ),
                            QtdDigitos,
                            Len(
                                With(
                                    {
                                        _semZZ: If(
                                            And(
                                                StartsWith(TelSoDigitos, "00"),
                                                Len(TelSoDigitos) > 10
                                            ),
                                            Mid(TelSoDigitos, 3),
                                            TelSoDigitos
                                        )
                                    },
                                    If(
                                        And(
                                            Left(_semZZ, 1) = "0",
                                            Not(TinhaPlus),
                                            Len(_semZZ) > 8
                                        ),
                                        Mid(_semZZ, 2),
                                        _semZZ
                                    )
                                )
                            )
                        )
                    );

                    // ETAPA 4 — Classificação rigorosa
                    ClearCollect(
                        colPaxDetect,
                        AddColumns(
                            colPaxNorm,

                            // Detector de lixo: todos iguais (0000000) ou sequencial (1234567890)
                            EhLixo,
                            Or(
                                // Todos dígitos iguais
                                Substitute(TelNorm, Left(TelNorm, 1), "") = "",
                                // Muito curto
                                QtdDigitos < 7,
                                // Campo vazio
                                TelOriginal = ""
                            ),

                            // ── BRASIL COM DDI 55 ──
                            // Celular: 55 + DD(2) + 9(1) + num(8) = 13 dígitos
                            EhBR55Cel,
                            And(
                                Left(TelNorm, 2) = "55",
                                QtdDigitos = 13,
                                Value(Mid(TelNorm, 3, 2)) >= 11,
                                Value(Mid(TelNorm, 3, 2)) <= 99,
                                Mid(TelNorm, 5, 1) = "9"
                            ),
                            // Fixo: 55 + DD(2) + num(8) = 12 dígitos
                            EhBR55Fix,
                            And(
                                Left(TelNorm, 2) = "55",
                                QtdDigitos = 12,
                                Value(Mid(TelNorm, 3, 2)) >= 11,
                                Value(Mid(TelNorm, 3, 2)) <= 99
                            ),

                            // ── BRASIL SEM DDI ──
                            // Celular local: DD(2) + 9(1) + num(8) = 11
                            EhBRLocalCel,
                            And(
                                Not(TinhaPlus),
                                Not(TinhaZeroZero),
                                QtdDigitos = 11,
                                Value(Left(TelNorm, 2)) >= 11,
                                Value(Left(TelNorm, 2)) <= 99,
                                Mid(TelNorm, 3, 1) = "9"
                            ),
                            // Fixo local: DD(2) + num(8) = 10
                            EhBRLocalFix,
                            And(
                                Not(TinhaPlus),
                                Not(TinhaZeroZero),
                                QtdDigitos = 10,
                                Value(Left(TelNorm, 2)) >= 11,
                                Value(Left(TelNorm, 2)) <= 99
                            ),
                            // Celular local antigo sem 9: DD(2) + num(8) = 10 com padrão cel
                            EhBRLocalCelAntigo,
                            And(
                                Not(TinhaPlus),
                                Not(TinhaZeroZero),
                                QtdDigitos = 10,
                                Value(Left(TelNorm, 2)) >= 11,
                                Value(Left(TelNorm, 2)) <= 99,
                                // Começa com 9/8/7/6 após DDD — padrão celular antigo
                                Value(Mid(TelNorm, 3, 1)) >= 6
                            ),

                            // ── INTERNACIONAL ──
                            EhInternacional,
                            And(
                                QtdDigitos >= 7,
            QtdDigitos <= 15, 
                                Or(TinhaPlus, TinhaZeroZero),
                                // Não é nenhum padrão BR
                                Not(
                                    And(
                                        Left(TelNorm, 2) = "55",
                                        Or(QtdDigitos = 12, QtdDigitos = 13)
                                    )
                                ),
                                Not(
                                    And(
                                        Not(TinhaPlus),
                                        Or(QtdDigitos = 10, QtdDigitos = 11)
                                    )
                                )
                            )
                        )
                    );

                    // ETAPA 5 — Decisão final + formatação
                    ClearCollect(
                        colPassageiros,
                        AddColumns(
                            colPaxDetect,

                            EhValido,
                            And(
                                Not(EhLixo),
                                Or(
                                    EhBR55Cel,
                                    EhBR55Fix,
                                    EhBRLocalCel,
                                    EhBRLocalFix,
                                    EhBRLocalCelAntigo,
                                    EhInternacional
                                )
                            ),

                            TelWhatsApp,
        If(
            Or(EhLixo, Not(Or(
                EhBR55Cel, EhBR55Fix,
                EhBRLocalCel, EhBRLocalFix,
                EhBRLocalCelAntigo, EhInternacional
            ))),
            "",  // inválido → vazio, link do WhatsApp não será gerado
            If(EhBR55Cel Or EhBR55Fix, TelNorm,
            If(EhBRLocalCel Or EhBRLocalFix, "55" & TelNorm,
            If(EhBRLocalCelAntigo,
                "55" & Left(TelNorm, 2) & "9" & Mid(TelNorm, 3),
            If(EhInternacional, TelNorm,
            ""))))
        ),

                            TelFormatado,
                            If(
                                Or(
                                    EhLixo,
                                    Not(
                                        Or(
                                            EhBR55Cel, EhBR55Fix,
                                            EhBRLocalCel, EhBRLocalFix,
                                            EhBRLocalCelAntigo, EhInternacional
                                        )
                                    )
                                ),
                                TelOriginal,

                                If(
                                    EhBR55Cel,
                                    "+55 (" & Mid(TelNorm, 3, 2) & ") "
                                        & Mid(TelNorm, 5, 5) & "-" & Right(TelNorm, 4),

                                If(
                                    EhBR55Fix,
                                    "+55 (" & Mid(TelNorm, 3, 2) & ") "
                                        & Mid(TelNorm, 5, 4) & "-" & Right(TelNorm, 4),

                                If(
                                    EhBRLocalCel,
                                    "+55 (" & Left(TelNorm, 2) & ") "
                                        & Mid(TelNorm, 3, 5) & "-" & Right(TelNorm, 4),

                                If(
                                    EhBRLocalFix,
                                    "+55 (" & Left(TelNorm, 2) & ") "
                                        & Mid(TelNorm, 3, 4) & "-" & Right(TelNorm, 4),

                                If(
                                    EhBRLocalCelAntigo,
                                    "+55 (" & Left(TelNorm, 2) & ") 9"
                                        & Mid(TelNorm, 3, 4) & "-" & Right(TelNorm, 4),

                                // Internacional: só põe + na frente
                                "+" & TelNorm
                                )))))
                            ),

                            PaxLine,
                            If(
                                And(NomePax = "", TelRaw = ""),
                                "",
                                "valido"
                            ),

                            MsgWhatsApp,
                            With(
                                {
                                    _nomeMotorista: With(
                                        {
                                            _nc: Trim(Coalesce(varMotoristaUser.'Nome completo', "")),
                                            _p: Split(Trim(Coalesce(varMotoristaUser.'Nome completo', "")), " ")
                                        },
                                        If(
                                            _nc = "",
                                            "",
                                            If(
                                                CountRows(_p) <= 2,
                                                _nc,
                                                First(_p).Value & " " & Last(_p).Value
                                            )
                                        )
                                    ),
                                    _nomePax: With(
                                        {
                                            _nc: Trim(Coalesce(NomePax, "")),
                                            _p: Split(Trim(Coalesce(NomePax, "")), " ")
                                        },
                                        If(
                                            _nc = "",
                                            "",
                                            If(
                                                CountRows(_p) <= 2,
                                                _nc,
                                                First(_p).Value & " " & Last(_p).Value
                                            )
                                        )
                                    ),
                                    _temNome: !IsBlank(varMotoristaUser.'Nome completo'),
                                    _temPax: NomePax <> "",
                                    _data: srvFinal.'Data e horário de saída',
                                    _hoje: DateDiff(
                                        Today(),
                                        DateValue(
                                            Text(
                                                srvFinal.'Data e horário de saída',
                                                "yyyy-mm-dd"
                                            )
                                        ),
                                        TimeUnit.Days
                                    ) = 0,
                                    _horario: If(
                                        IsBlank(srvFinal.'Data e horário de saída'),
                                        "",
                                        Text(srvFinal.'Data e horário de saída', "hh:mm")
                                    ),
                                    _dataFormatada: If(
                                        IsBlank(srvFinal.'Data e horário de saída'),
                                        "",
                                        Text(srvFinal.'Data e horário de saída', "dd/mm/yyyy")
                                    )
                                },
                                EncodeUrl(
                                    Switch(
                                        IdiomaRaw,

                                        Idioma.Inglês,
                                        "Hello " & If(_temPax, _nomePax & ",", ",")
                                        & Char(10) & Char(10)
                                        & If(
                                            _temNome,
                                            "My name is " & _nomeMotorista & ", and I have been assigned by Betinhos as the responsible for your service ",
                                            "I have been assigned by Betinhos as the responsible for your service "
                                        )
                                        & If(
                                            IsBlank(_data),
                                            "at a time to be confirmed",
                                            If(
                                                _hoje,
                                                "today at *" & _horario & "*",
                                                "on " & _dataFormatada & " at *" & _horario & "*"
                                            )
                                        )
                                        & "."
                                        & Char(10) & Char(10)
                                        & "I am already at the departure location and ready to assist you whenever you need."
                                        & Char(10) & Char(10)
                                        & "Should you require any additional support, our team is available:"
                                        & Char(10)
                                        & "Phone: +55 (12) 99723-6961"
                                        & Char(10)
                                        & "Email: junior@betinhos.com.br"
                                        & Char(10) & Char(10)
                                        & "See you soon,"
                                        & Char(10)
                                        & If(_temNome, _nomeMotorista & Char(10), "")
                                        & "Betinhos Executive Service",

                                        Idioma.Espanhol,
                                        "Hola " & If(_temPax, _nomePax & ",", ",")
                                        & Char(10) & Char(10)
                                        & If(
                                            _temNome,
                                            "Mi nombre es " & _nomeMotorista & ", y he sido designado por Betinhos como el responsable de su servicio ",
                                            "He sido designado por Betinhos como el responsable de su servicio "
                                        )
                                        & If(
                                            IsBlank(_data),
                                            "en un horario a confirmar",
                                            If(
                                                _hoje,
                                                "hoy a las *" & _horario & "*",
                                                "el " & _dataFormatada & " a las *" & _horario & "*"
                                            )
                                        )
                                        & "."
                                        & Char(10) & Char(10)
                                        & "Ya me encuentro en el lugar de salida y listo para recibirlo/a cuando me necesite."
                                        & Char(10) & Char(10)
                                        & "Si necesita cualquier soporte adicional, nuestro equipo esta a disposicion:"
                                        & Char(10)
                                        & "Telefono: +55 (12) 99723-6961"
                                        & Char(10)
                                        & "Email: junior@betinhos.com.br"
                                        & Char(10) & Char(10)
                                        & "Hasta pronto,"
                                        & Char(10)
                                        & If(_temNome, _nomeMotorista & Char(10), "")
                                        & "Betinhos Executive Service",

                                        // PORTUGUÊS (default)
        "Olá " & If(_temPax, _nomePax & ",", ",")
        & Char(10) & Char(10)
        & If(
            _temNome,
            "Sou o *" & _nomeMotorista & "* da *Betinhos*, e serei o responsável pelo seu transporte ",
            "Fui designado pela *Betinhos* como o responsável pelo seu atendimento "
        )
        & If(
            IsBlank(_data),
            "no horário a confirmar",
            If(
                _hoje,
                "hoje, às *" & _horario & "*",
                _dataFormatada & " às *" & _horario & "*"
            )
        )
        & "."
        & Char(10) & Char(10)
        & "Já estou no local de saída e pronto para recebê-lo(a) assim que você me necessitar."
        & Char(10) & Char(10)
        & "Caso necessite de qualquer suporte adicional, nossa central está à disposição:"
        & Char(10)
        & "Telefone: +55 (12) 99723-6961"
        & Char(10)
        & "Email: junior@betinhos.com.br"
        & Char(10) & Char(10)
        & "Até breve,"
        & Char(10)
        & If(
            _temNome,
            "*" & _nomeMotorista & "*" & Char(10),
            ""
        )
        & "*Betinhos Executive Service*"
                                    )
                                )
                            )
                        )
                    );

                    // Limpa intermediárias
                    Clear(colPaxRaw);
                    Clear(colPaxLimpo);
                    Clear(colPaxNorm);
                    Clear(colPaxDetect)
                );

                Set(varLoading, false)
            )
        );
    Children:
      - Container1_3:
          Control: GroupContainer@1.5.0
          Variant: AutoLayout
          Properties:
            DropShadow: =DropShadow.None
            Fill: =RGBA(240, 240, 240, 1)
            Height: =Parent.Height
            LayoutAlignItems: =LayoutAlignItems.Center
            LayoutDirection: =LayoutDirection.Vertical
            RadiusBottomLeft: =0
            RadiusBottomRight: =0
            RadiusTopLeft: =0
            RadiusTopRight: =0
            Width: =Parent.Width
          Children:
            - Container5_3:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  LayoutAlignItems: =LayoutAlignItems.Center
                  LayoutDirection: =LayoutDirection.Vertical
                  LayoutGap: =8
                  PaddingBottom: =8
                  PaddingLeft: =8
                  PaddingRight: =8
                  PaddingTop: =8
                  X: =40
                  Y: =40
                Children:
                  - Menu_3:
                      Control: GroupContainer@1.5.0
                      Variant: AutoLayout
                      Properties:
                        Fill: =RGBA(255, 255, 255, 1)
                        FillPortions: =0
                        Height: =70
                        LayoutAlignItems: =LayoutAlignItems.Center
                        LayoutDirection: =LayoutDirection.Horizontal
                        LayoutGap: =16
                        LayoutMaxHeight: =70
                        LayoutMinHeight: =70
                        LayoutMinWidth: =16
                        PaddingBottom: =16
                        PaddingLeft: =16
                        PaddingRight: =16
                        PaddingTop: =16
                        RadiusBottomLeft: =8
                        RadiusBottomRight: =8
                        RadiusTopLeft: =8
                        RadiusTopRight: =8
                      Children:
                        - Container7_4:
                            Control: GroupContainer@1.5.0
