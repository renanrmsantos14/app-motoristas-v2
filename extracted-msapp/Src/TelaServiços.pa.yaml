                                                LayoutMinWidth: =16
                                                Text: "=With(\n    {\n        _t: ThisItem.DadosTROCA,\n        _v1: ThisItem.DadosTROCA.'Veículo 1 (Antes da Troca)',\n        _v2: ThisItem.DadosTROCA.'Veículo 2 (Antes da Troca)',\n        _isMot1: varMotoristaUser.'GUID Funcionários' = ThisItem.DadosTROCA.'Motorista 1'.'GUID Funcionários',\n        _isMot2: varMotoristaUser.'GUID Funcionários' = ThisItem.DadosTROCA.'Motorista 2'.'GUID Funcionários'\n    },\n    Switch(\n        _t.'Tipo de Troca',\n        \n        // \U0001F504 TROCA ENTRE MOTORISTAS\n        'Tipo de Troca de Carro'.Troca,\n            If(\n                IsBlank(_v1) || IsBlank(_v2), \"Veículos registrados na conclusão\",\n                _isMot1, \n                    Coalesce(_v1.Modelo, \"Veículo\") & \" \" & Coalesce(_v1.Placa, \"S/ placa\") & \" -> \" & \n                    Coalesce(_v2.Modelo, \"Veículo\") & \" \" & Coalesce(_v2.Placa, \"S/ placa\"),\n                _isMot2, \n                    Coalesce(_v2.Modelo, \"Veículo\") & \" \" & Coalesce(_v2.Placa, \"S/ placa\") & \" -> \" & \n                    Coalesce(_v1.Modelo, \"Veículo\") & \" \" & Coalesce(_v1.Placa, \"S/ placa\"),\n                \"Veículos registrados na conclusão\"\n            ),\n            \n        // \U0001F697 RETIRADA DA BASE\n        'Tipo de Troca de Carro'.'Retirada da base',\n            If(\n                IsBlank(_v2), \"Veículo não registrado\",\n                \"BASE -> \" & Coalesce(_v2.Modelo, \"Veículo\") & \" \" & Coalesce(_v2.Placa, \"S/ placa\")\n            ),\n            \n        // \U0001F4E6 DEVOLUÇÃO À BASE\n        'Tipo de Troca de Carro'.'Devolução à base',\n            If(\n                IsBlank(_v1), \"Veículo não registrado\",\n                Coalesce(_v1.Modelo, \"Veículo\") & \" \" & Coalesce(_v1.Placa, \"S/ placa\") & \" -> BASE\"\n            ),\n            \n        // ⚠️ FALLBACK\n        \"Operação não identificada\"\n    )\n)"
                                                Visible: =false
                                                Weight: ='TextCanvas.Weight'.Semibold
                                                Wrap: =false
