Screens:
  TelaServiços:
    Properties:
      Fill: =RGBA(255, 255, 255, 1)
      LoadingSpinnerColor: =RGBA(0, 120, 212, 1)
      OnVisible: |-
        =Set(
            varLoading,
            true
        );
        Set(
            varOrientacao,
            If(
                App.Width > App.Height,
                "Paisagem",
                "Retrato"
            )
        );
        If(
            IsBlank(varMotoristaUser.'GUID Funcionários'),
            Notify(
                "Usuário sem GUID. Volte e tente novamente.",
                NotificationType.Error,
                5000
            );
            Set(
                varLoading,
                false
            ),
            // === FASE 1: Busca paralela no Dataverse ===
            With(
                {
                    dtIni: DateAdd(
                        Now(),
                        -24,
                        TimeUnit.Hours
                    ),
                    dtFim: DateAdd(Now(), 3, TimeUnit.Days),
                    guid: varMotoristaUser.'GUID Funcionários'
                },
                Concurrent(
                    ClearCollect(
                        colAgendaServicos,
                        ForAll(
                            Filter(
                                Geral As G,
                                G.'Data e horário de saída' >= dtIni && G.'Data e horário de saída' <= dtFim && G.Motorista.'GUID Funcionários' = guid && G.'Status de Operação' <> 'Status de Operação'.Concluído && G.'Status de Operação' <> 'Status de Operação'.'Requer Análise' && IsBlank(G.OM) && IsBlank(G.OT) && G.'Categoria do Item' = 'Categoria do Item'.Serviço && G.'Foi Programado?' = true
                            ) As S,
                            {
                                Tipo: "SERVICO",
                                DtOrdem: Coalesce(
                                    S.'Data e horário de saída',
                                    dtIni
                                ),
                                DadosSERVICO: S,
                                DadosTROCA: Blank(),
                                DadosTROCAGeral: Blank(),
                                DadosMANUTENCAO: Blank(),
                                DadosMANUTENCAOGeral: Blank()
                            }
                        )
                    ),
                    ClearCollect(
                        colAgendaManut,
                        ForAll(
                            Filter(
                                Geral As G,
                                G.'Data e horário de saída' >= dtIni && G.'Data e horário de saída' <= dtFim && G.Motorista.'GUID Funcionários' = guid && !IsBlank(G.OM) && IsBlank(G.OT) && G.'Status de Operação' <> 'Status de Operação'.Concluído && G.'Categoria do Item' = 'Categoria do Item'.Manutenção && G.'Foi Programado?' = true
                            ) As S,
                            If(
                                S.OM.'Status (cr40f_status)' = 'Status (Manutenções)'.Realizado,
                                Blank(),
                                {
                                    Tipo: "MANUTENCAO",
                                    DtOrdem: Coalesce(
                                        S.'Data e horário de saída',
                                        dtIni
                                    ),
                                    DadosSERVICO: Blank(),
                                    DadosTROCA: Blank(),
                                    DadosTROCAGeral: Blank(),
                                    DadosMANUTENCAO: S.OM,
                                    DadosMANUTENCAOGeral: S
                                }
                            )
                        )
                    ),
                    ClearCollect(
                        colTrocasFiltradas,
                        Filter(
            'Trocas de Carro',
            'Início da Janela de Troca' <= dtFim &&
            'Fim da Janela de Troca' >= dtIni &&
            ('Motorista 1'.'GUID Funcionários' = guid || 'Motorista 2'.'GUID Funcionários' = guid) &&
            'Status (cr40f_statusdatroca)' <> 'Status da Troca de Carro'.Concluída &&
            Not(
                ('Motorista 1'.'GUID Funcionários' = guid && 'Concluído Motorista 1' = true) ||
                ('Motorista 2'.'GUID Funcionários' = guid && 'Concluído Motorista 2' = true)
            )
        )
                    ),
                    ClearCollect(
                        colGuidProgramados,
                        Filter(
                            Geral As G,
                            G.'Categoria do Item' = 'Categoria do Item'.'Troca de Veículos' && G.'Foi Programado?' = true
                        )
                    )
                );
                // === FASE 2: Trocas (depende de colTrocasFiltradas + colGuidProgramados) ===
                ClearCollect(
                    colAgendaTrocas,
                    ForAll(
                        Filter(
                            colTrocasFiltradas As T,
                            CountIf(
                                colGuidProgramados,
                                OT.'GUID Trocas de Carro' = T.'GUID Trocas de Carro'
                            ) > 0
                        ) As T,
                        With(
                            {
                                geralRec: LookUp(
                                    colGuidProgramados,
                                    OT.'GUID Trocas de Carro' = T.'GUID Trocas de Carro'
                                )
                            },
                            {
                                Tipo: "TROCA",
                                DtOrdem: Coalesce(
                                    T.'Início da Janela de Troca',
                                    dtIni
                                ),
                                DadosSERVICO: Blank(),
                                DadosTROCA: T,
                                DadosTROCAGeral: geralRec,
                                DadosMANUTENCAO: Blank(),
                                DadosMANUTENCAOGeral: Blank()
                            }
                        )
                    )
                );
                // === FASE 3: Consolidar + Montar UI em bulk ===
                ClearCollect(
                    colAgenda,
                    colAgendaServicos,
                    colAgendaTrocas,
                    Filter(
                        colAgendaManut,
                        !IsBlank(Tipo)
                    )
                );
                ClearCollect(
                    colAgendaUI,
                    AddColumns(
                        colAgenda,
                        DtLocal,
                        DtOrdem,
                        DataChave,
                        DateValue(DtOrdem),
                        TituloData,
                        "",
                        Seta,
                        "",
                        SearchText,
                        Switch(
                            Tipo,
                            "SERVICO",
                            Lower(
                                Coalesce(
                                    Text(DadosSERVICO.ID),
                                    ""
                                ) & " " & Coalesce(
                                    DadosSERVICO.'Pax - VIEW',
                                    ""
                                ) & " " & Coalesce(
                                    DadosSERVICO.Cliente.'Nome do cliente',
                                    ""
                                ) & " " & Coalesce(
                                    DadosSERVICO.'Ed de Saída - VIEW',
                                    ""
                                ) & " " & Coalesce(
                                    DadosSERVICO.Destino,
                                    ""
                                ) & " " & Coalesce(
                                    DadosSERVICO.Motorista.'Nome completo',
                                    ""
                                ) & " " & Coalesce(
                                    DadosSERVICO.'Obs de Operação',
                                    ""
                                ) & " " & Coalesce(
                                    DadosSERVICO.Solicitante.'Nome do Passageiro',
                                    ""
                                ) & " " & Coalesce(
                                    DadosSERVICO.Trajeto,
                                    ""
                                ) & " " & Coalesce(
                                    DadosSERVICO.Veículo.Placa,
                                    ""
                                ) & " " & Coalesce(
                                    Text(DadosSERVICO.'Tipo de Veículo'),
                                    ""
                                ) & " " & Text(
                                    DadosSERVICO.'Data e horário de saída',
                                    "[$-pt-BR]dd/MM/yyyy HH:mm"
                                )
                            ),
                            "TROCA",
                            Lower(
                                Coalesce(
                                    Text(DadosTROCA.ID),
                                    ""
                                ) & " " & Coalesce(
                                    DadosTROCA.'Veículo 1 (Antes da Troca)'.Placa,
                                    ""
                                ) & " " & Coalesce(
                                    DadosTROCA.'Veículo 2 (Antes da Troca)'.Placa,
                                    ""
                                ) & " " & Coalesce(
                                    DadosTROCA.'Motorista 1'.'Nome completo',
                                    ""
                                ) & " " & Coalesce(
                                    DadosTROCA.'Motorista 2'.'Nome completo',
                                    ""
                                ) & " " & Coalesce(
                                    DadosTROCA.Observação,
                                    ""
                                ) & " " & Text(
                                    DadosTROCA.'Início da Janela de Troca',
                                    "[$-pt-BR]dd/MM/yyyy HH:mm"
                                ) & " " & Text(
                                    DadosTROCA.'Fim da Janela de Troca',
                                    "[$-pt-BR]dd/MM/yyyy HH:mm"
                                )
                            ),
                            "MANUTENCAO",
                            Lower(
                                Coalesce(
                                    Text(DadosMANUTENCAO.ID),
                                    ""
                                ) & " " & Coalesce(
                                    DadosMANUTENCAO.Veículo.Placa,
                                    ""
                                ) & " " & Coalesce(
                                    DadosMANUTENCAO.Descrição,
                                    ""
                                ) & " " & Coalesce(
                                    DadosMANUTENCAOGeral.'Obs de Operação',
                                    ""
                                ) & " " & Text(
                                    DtOrdem,
                                    "[$-pt-BR]dd/MM/yyyy HH:mm"
                                )
                            ),
                            ""
                        ),

                        //_________________CONDIÇÕES E PRIORIDADES PARA AS NOTIFICAÇÕES DA GALERIA DE SERVIÇOS____________________________________________
                        // ---------------------------------------------------------------------
                        // Nº  | NOME DO ÍCONE                          | TIPO
                        // ---------------------------------------------------------------------
                        // 1   | Saída em < 30 min e não visto/editado  | SERVICO / TROCA / MANUTENCAO
                        // 3   | Nunca visualizado OU editado não visto | SERVICO / TROCA / MANUTENCAO
                        // 10  | Receber = Sim (sempre, independente)   | SERVICO apenas
                        // 0   | Nenhum ícone                           | qualquer
                        // ---------------------------------------------------------------------
                        // TOLERÂNCIA: 10s para ignorar o modifiedon gerado pelo próprio Patch
                        // de visualização. Se o ícone continuar preso após visualizar,
                        // aumente esse valor (ex: 30). Afeta todas as comparações abaixo.
                        // ---------------------------------------------------------------------
                        IconePrioridade,
                        Switch(
                            Tipo,

                            "SERVICO",
                            If(
                                // PRIORIDADE 1 — Saída em menos de 30 min E não visto ou editado após visualização
                                DateDiff(
                                    Now(),
                                    DadosSERVICO.'Data e horário de saída',
                                    TimeUnit.Minutes
                                ) <= 30 &&
                                DateDiff(
                                    Now(),
                                    DadosSERVICO.'Data e horário de saída',
                                    TimeUnit.Minutes
                                ) >= 0 &&
                                (
                                    IsBlank(DadosSERVICO.'Visualização do Motorista') ||
                                    (
                                        !IsBlank(DadosSERVICO.'Visualização do Motorista') &&
                                        DateDiff(
                                            DadosSERVICO.'Visualização do Motorista',
                                            DadosSERVICO.'Data de Modificação',
                                            TimeUnit.Seconds
                                        ) > 10
                                    )
                                ),
                                1,

                                // PRIORIDADE 3 — Nunca visualizado OU editado após visualização e motorista não viu
                                IsBlank(DadosSERVICO.'Visualização do Motorista') ||
                                (
                                    !IsBlank(DadosSERVICO.'Visualização do Motorista') &&
                                    DateDiff(
                                        DadosSERVICO.'Visualização do Motorista',
                                        DadosSERVICO.'Data de Modificação',
                                        TimeUnit.Seconds
                                    ) > 10
                                ),
                                3,

                                // PRIORIDADE 10 — Receber = Sim (sempre, independente de visualização)
                                DadosSERVICO.Receber = true,
                                10,

                                // NENHUM — item normal, sem destaque
                                0
                            ),

                            "TROCA",
                            If(
                                // PRIORIDADE 1 — Saída em menos de 30 min E não visto ou editado após visualização
                                DateDiff(
                                    Now(),
                                    DadosTROCAGeral.'Data e horário de saída',
                                    TimeUnit.Minutes
                                ) <= 30 &&
                                DateDiff(
                                    Now(),
                                    DadosTROCAGeral.'Data e horário de saída',
                                    TimeUnit.Minutes
                                ) >= 0 &&
                                (
                                    IsBlank(DadosTROCAGeral.'Visualização do Motorista') ||
                                    (
                                        !IsBlank(DadosTROCAGeral.'Visualização do Motorista') &&
                                        DateDiff(
                                            DadosTROCAGeral.'Visualização do Motorista',
                                            DadosTROCAGeral.'Data de Modificação',
                                            TimeUnit.Seconds
                                        ) > 10
                                    )
                                ),
                                1,

                                // PRIORIDADE 3 — Nunca visualizado OU editado após visualização e motorista não viu
                                IsBlank(DadosTROCAGeral.'Visualização do Motorista') ||
                                (
                                    !IsBlank(DadosTROCAGeral.'Visualização do Motorista') &&
                                    DateDiff(
                                        DadosTROCAGeral.'Visualização do Motorista',
                                        DadosTROCAGeral.'Data de Modificação',
                                        TimeUnit.Seconds
                                    ) > 10
                                ),
                                3,

                                0
                            ),

                            "MANUTENCAO",
                            If(
                                // PRIORIDADE 1 — Saída em menos de 30 min E não visto ou editado após visualização
                                DateDiff(
                                    Now(),
                                    DadosMANUTENCAOGeral.'Data e horário de saída',
                                    TimeUnit.Minutes
                                ) <= 30 &&
                                DateDiff(
                                    Now(),
                                    DadosMANUTENCAOGeral.'Data e horário de saída',
                                    TimeUnit.Minutes
                                ) >= 0 &&
                                (
                                    IsBlank(DadosMANUTENCAOGeral.'Visualização do Motorista') ||
                                    (
                                        !IsBlank(DadosMANUTENCAOGeral.'Visualização do Motorista') &&
                                        DateDiff(
                                            DadosMANUTENCAOGeral.'Visualização do Motorista',
                                            DadosMANUTENCAOGeral.'Data de Modificação',
                                            TimeUnit.Seconds
                                        ) > 10
                                    )
                                ),
                                1,

                                // PRIORIDADE 3 — Nunca visualizado OU editado após visualização e motorista não viu
                                IsBlank(DadosMANUTENCAOGeral.'Visualização do Motorista') ||
                                (
                                    !IsBlank(DadosMANUTENCAOGeral.'Visualização do Motorista') &&
                                    DateDiff(
                                        DadosMANUTENCAOGeral.'Visualização do Motorista',
                                        DadosMANUTENCAOGeral.'Data de Modificação',
                                        TimeUnit.Seconds
                                    ) > 10
                                ),
                                3,

                                0
                            ),

                            // HEADER não exibe ícone
                            0
                        )
                        // =====================================================================
                        // FIM DO CAMPO IconePrioridade
                        // =====================================================================

                    )
                );
                With(
                    {t: Today()},
                    ForAll(
                        SortByColumns(
                            RenameColumns(
                                Distinct(
                                    colAgendaUI,
                                    DataChave
                                ),
                                Value,
                                DataChave
                            ),
                            "DataChave",
                            SortOrder.Ascending
                        ) As D,
                        Collect(
                            colAgendaUI,
                            {
                                Tipo: "HEADER",
                                DtOrdem: DateTimeValue(
                                    Text(
                                        D.DataChave,
                                        "[$-en-US]yyyy-mm-dd"
                                    ) & " 00:00"
                                ),
                                DtLocal: DateTimeValue(
                                    Text(
                                        D.DataChave,
                                        "[$-en-US]yyyy-mm-dd"
                                    ) & " 00:00"
                                ),
                                DataChave: D.DataChave,
                                TituloData: "Serviços de " & If(
                                    D.DataChave = t,
                                    "HOJE",
                                    D.DataChave = DateAdd(
                                        t,
                                        1
                                    ),
                                    "AMANHÃ",
                                    D.DataChave = DateAdd(
                                        t,
                                        -1
                                    ),
                                    "ONTEM",
                                    With(
            {_dia: Weekday(D.DataChave, StartOfWeek.Sunday)},
            Switch(
                _dia,
                1, "DOMINGO",
                2, "SEGUNDA",
                3, "TERÇA",
                4, "QUARTA",
                5, "QUINTA",
                6, "SEXTA",
                7, "SÁBADO"
            )
        )
                                ),
                                Seta: "▾",
                                DadosSERVICO: Blank(),
                                DadosTROCA: Blank(),
                                DadosTROCAGeral: Blank(),
                                DadosMANUTENCAO: Blank(),
                                DadosMANUTENCAOGeral: Blank(),
                                SearchText: "",
                                IconePrioridade: 0
                            }
                        )
                    )
                );
                ClearCollect(
                    colAgendaUI,
                    SortByColumns(
                        colAgendaUI,
                        "DtLocal",
                        SortOrder.Ascending,
                        "Tipo",
                        SortOrder.Ascending
                    )
                )
            );
            Set(
                varLoading,
                false
            )
        )
    Children:
      - Container1_2:
          Control: GroupContainer@1.5.0
          Variant: AutoLayout
          Properties:
            DropShadow: =DropShadow.None
            Fill: =RGBA(240, 240, 240, 1)
            Height: =Parent.Height
            LayoutAlignItems: =LayoutAlignItems.Center
            LayoutDirection: =LayoutDirection.Vertical
            RadiusBottomLeft: =0
            RadiusBottomRight: =0
            RadiusTopLeft: =0
            RadiusTopRight: =0
            Width: =Parent.Width
          Children:
            - Container5_2:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  LayoutAlignItems: =LayoutAlignItems.Center
                  LayoutDirection: =LayoutDirection.Vertical
                  LayoutGap: =8
                  PaddingBottom: =8
                  PaddingLeft: =8
                  PaddingRight: =8
                  PaddingTop: =8
                  X: =40
                  Y: =40
                Children:
                  - Menu_2:
                      Control: GroupContainer@1.5.0
                      Variant: AutoLayout
                      Properties:
                        Fill: =RGBA(255, 255, 255, 1)
                        FillPortions: =0
                        Height: =70
                        LayoutAlignItems: =LayoutAlignItems.Center
                        LayoutDirection: =LayoutDirection.Horizontal
                        LayoutMaxHeight: =70
                        LayoutMinHeight: =70
                        LayoutMinWidth: =16
                        PaddingBottom: =8
                        PaddingLeft: =8
                        PaddingRight: =8
                        PaddingTop: =8
                        RadiusBottomLeft: =8
                        RadiusBottomRight: =8
                        RadiusTopLeft: =8
                        RadiusTopRight: =8
                      Children:
                        - Container2_3:
                            Control: GroupContainer@1.5.0
                            Variant: AutoLayout
                            Properties:
                              DropShadow: =DropShadow.None
                              LayoutAlignItems: =LayoutAlignItems.Stretch
                              LayoutDirection: =LayoutDirection.Horizontal
                              LayoutGap: =8
                              LayoutJustifyContent: =LayoutJustifyContent.SpaceBetween
                              LayoutMinHeight: =16
                              LayoutMinWidth: =16
                              PaddingBottom: =8
                              PaddingLeft: =8
                              PaddingRight: =8
                              PaddingTop: =8
                              RadiusBottomLeft: =0
                              RadiusBottomRight: =0
                              RadiusTopLeft: =0
                              RadiusTopRight: =0
                            Children:
                              - Container7_1:
                                  Control: GroupContainer@1.5.0
                                  Variant: ManualLayout
                                  Properties:
                                    DropShadow: =DropShadow.None
                                    FillPortions: =0
                                    LayoutMinHeight: =16
                                    LayoutMinWidth: =16
                                    RadiusBottomLeft: =0
                                    RadiusBottomRight: =0
                                    RadiusTopLeft: =0
                                    RadiusTopRight: =0
                                    Width: =Self.Height
                                  Children:
                                    - ButtonCanvas1_1:
                                        Control: Button@0.0.45
                                        Properties:
                                          Appearance: ='ButtonCanvas.Appearance'.Transparent
                                          BorderRadius: =0
                                          FontSize: =40
                                          Height: =Parent.Height
                                          Icon: ="Home"
                                          IconStyle: ='ButtonCanvas.IconStyle'.Outline
                                          Layout: ='ButtonCanvas.Layout'.IconOnly
                                          OnSelect: =Navigate(TelaInicial, ScreenTransition.Fade);
                                          PaddingBottom: =0
                                          PaddingLeft: =0
                                          PaddingRight: =0
                                          PaddingTop: =0
                                          Text: =
                                          Width: =Parent.Width
                              - Container7_8:
                                  Control: GroupContainer@1.5.0
                                  Variant: ManualLayout
                                  Properties:
                                    DropShadow: =DropShadow.None
                                    FillPortions: =0
                                    Height: =42
                                    LayoutMinHeight: =0
                                    LayoutMinWidth: =0
                                    RadiusBottomLeft: =0
                                    RadiusBottomRight: =0
                                    RadiusTopLeft: =0
                                    RadiusTopRight: =0
                                    Width: =Self.Height
                                    X: =40
                                    Y: =40
                                  Children:
                                    - ButtonCanvas1_3:
                                        Control: Button@0.0.45
                                        Properties:
                                          Appearance: ='ButtonCanvas.Appearance'.Transparent
                                          BorderRadius: =0
                                          FontSize: =40
                                          Height: =Parent.Height
                                          Icon: ="ArrowClockwise"
                                          IconStyle: ='ButtonCanvas.IconStyle'.Outline
                                          Layout: ='ButtonCanvas.Layout'.IconOnly
                                          OnSelect: |-
                                            =Set(
                                                varLoading,
                                                true
                                            );
                                            Set(
                                                varOrientacao,
                                                If(
                                                    App.Width > App.Height,
                                                    "Paisagem",
                                                    "Retrato"
                                                )
                                            );
                                            If(
                                                IsBlank(varMotoristaUser.'GUID Funcionários'),
                                                Notify(
                                                    "Usuário sem GUID. Volte e tente novamente.",
                                                    NotificationType.Error,
                                                    5000
                                                );
                                                Set(
                                                    varLoading,
                                                    false
                                                ),
                                                // === FASE 1: Busca paralela no Dataverse ===
                                                With(
                                                    {
                                                        dtIni: DateAdd(
                                                            Now(),
                                                            -24,
                                                            TimeUnit.Hours
                                                        ),
                                                        dtFim: DateAdd(Now(), 3, TimeUnit.Days),
                                                        guid: varMotoristaUser.'GUID Funcionários'
                                                    },
                                                    Concurrent(
                                                        ClearCollect(
                                                            colAgendaServicos,
                                                            ForAll(
                                                                Filter(
                                                                    Geral As G,
                                                                    G.'Data e horário de saída' >= dtIni && G.'Data e horário de saída' <= dtFim && G.Motorista.'GUID Funcionários' = guid && G.'Status de Operação' <> 'Status de Operação'.Concluído && G.'Status de Operação' <> 'Status de Operação'.'Requer Análise' && IsBlank(G.OM) && IsBlank(G.OT) && G.'Categoria do Item' = 'Categoria do Item'.Serviço && G.'Foi Programado?' = true
                                                                ) As S,
                                                                {
                                                                    Tipo: "SERVICO",
                                                                    DtOrdem: Coalesce(
                                                                        S.'Data e horário de saída',
                                                                        dtIni
                                                                    ),
                                                                    DadosSERVICO: S,
                                                                    DadosTROCA: Blank(),
                                                                    DadosTROCAGeral: Blank(),
                                                                    DadosMANUTENCAO: Blank(),
                                                                    DadosMANUTENCAOGeral: Blank()
                                                                }
                                                            )
                                                        ),
                                                        ClearCollect(
                                                            colAgendaManut,
                                                            ForAll(
                                                                Filter(
                                                                    Geral As G,
                                                                    G.'Data e horário de saída' >= dtIni && G.'Data e horário de saída' <= dtFim && G.Motorista.'GUID Funcionários' = guid && !IsBlank(G.OM) && IsBlank(G.OT) && G.'Status de Operação' <> 'Status de Operação'.Concluído && G.'Categoria do Item' = 'Categoria do Item'.Manutenção && G.'Foi Programado?' = true
                                                                ) As S,
                                                                If(
                                                                    S.OM.'Status (cr40f_status)' = 'Status (Manutenções)'.Realizado,
                                                                    Blank(),
                                                                    {
                                                                        Tipo: "MANUTENCAO",
                                                                        DtOrdem: Coalesce(
                                                                            S.'Data e horário de saída',
                                                                            dtIni
                                                                        ),
                                                                        DadosSERVICO: Blank(),
                                                                        DadosTROCA: Blank(),
                                                                        DadosTROCAGeral: Blank(),
                                                                        DadosMANUTENCAO: S.OM,
                                                                        DadosMANUTENCAOGeral: S
                                                                    }
                                                                )
                                                            )
                                                        ),
                                                        ClearCollect(
                                                            colTrocasFiltradas,
                                                            Filter(
                                                'Trocas de Carro',
                                                'Início da Janela de Troca' <= dtFim &&
                                                'Fim da Janela de Troca' >= dtIni &&
                                                ('Motorista 1'.'GUID Funcionários' = guid || 'Motorista 2'.'GUID Funcionários' = guid) &&
                                                'Status (cr40f_statusdatroca)' <> 'Status da Troca de Carro'.Concluída &&
                                                Not(
                                                    ('Motorista 1'.'GUID Funcionários' = guid && 'Concluído Motorista 1' = true) ||
                                                    ('Motorista 2'.'GUID Funcionários' = guid && 'Concluído Motorista 2' = true)
                                                )
                                            )
                                                        ),
                                                        ClearCollect(
                                                            colGuidProgramados,
                                                            Filter(
                                                                Geral As G,
                                                                G.'Categoria do Item' = 'Categoria do Item'.'Troca de Veículos' && G.'Foi Programado?' = true
                                                            )
                                                        )
                                                    );
                                                    // === FASE 2: Trocas (depende de colTrocasFiltradas + colGuidProgramados) ===
                                                    ClearCollect(
                                                        colAgendaTrocas,
                                                        ForAll(
                                                            Filter(
                                                                colTrocasFiltradas As T,
                                                                CountIf(
                                                                    colGuidProgramados,
                                                                    OT.'GUID Trocas de Carro' = T.'GUID Trocas de Carro'
                                                                ) > 0
                                                            ) As T,
                                                            With(
