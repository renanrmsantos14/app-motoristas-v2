App:
  Properties:
    BackEnabled: =false
    OnStart: |-
      =Set(varLoading, true);

      // ── 1) Parâmetros de URL ────────────────────────────────────────────────────
      Set(gParamServicoId, Coalesce(Param("servicoId"), ""));
      Set(gParamConsumed, false);
      Set(gParamTipo, Coalesce(Param("tipo"), ""));
      Set(varErroApp, "");

      // ── 2) Identificar Motorista Logado ─────────────────────────────────────────
      Set(
          varMotoristaUser,
          IfError(
              LookUp(Funcionários, 'Email Microsoft' = User().Email),
              Blank()
          )
      );
      If(
          IsBlank(varMotoristaUser),
          Set(varErroApp, "Usuário não encontrado no banco de dados. Entre em contato com o suporte Betinhos.")
      );


      Set(varLoading, false);
    StartScreen: |-
      =If(
          !IsBlank(Param("servicoId")),
          TelaServiços,
          TelaInicial
      )
    Theme: =PowerAppsTheme
