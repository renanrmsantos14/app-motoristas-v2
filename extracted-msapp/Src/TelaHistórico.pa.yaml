                                                                                Lower(
                                                                                    Coalesce(Text(G.DadosSERVICO.ID), "")                                       & " " &
                                                                                    Coalesce(G.DadosSERVICO.'Pax - VIEW', "")            & " " &
                                                                                    Coalesce(G.DadosSERVICO.Cliente.'Nome do cliente', "")                      & " " &
                                                                                    Coalesce(G.DadosSERVICO.'Ed de Saída - VIEW', "")                            & " " &
                                                                                    Coalesce(G.DadosSERVICO.Destino, "")                                        & " " &
