                                                                            Hour(G.DadosSERVICO.'Data e horário de saída')   = Value(Mid(q, 12, 2)) &&
                                                                            Minute(G.DadosSERVICO.'Data e horário de saída') = Value(Right(q, 2))
                                                                        ) ||
                                                                        (
                                                                            IsMatch(q, "^[0-9]{2}/[0-9]{2}/[0-9]{4}$") &&
                                                                            Day(G.DadosSERVICO.'Data e horário de saída')   = Value(Left(q, 2)) &&
                                                                            Month(G.DadosSERVICO.'Data e horário de saída') = Value(Mid(q, 4, 2)) &&
