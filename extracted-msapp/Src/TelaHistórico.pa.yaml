                                                                        (
                                                                            IsMatch(q, "^[0-9]{2}/[0-9]{2}$") &&
                                                                            Day(G.DadosSERVICO.'Data e horário de saída')   = Value(Left(q, 2)) &&
                                                                            Month(G.DadosSERVICO.'Data e horário de saída') = Value(Right(q, 2))
